name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk-headless python3-pip python3-setuptools python3-dev build-essential libssl-dev libffi-dev libjpeg-dev zlib1g-dev

      - name: Install Buildozer and Kivy
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user buildozer==1.4.3 cython kivy
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        working-directory: android_app
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-app-apk
          path: android_app/bin/*.apk
